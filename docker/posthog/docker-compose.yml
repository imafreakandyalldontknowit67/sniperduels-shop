version: "3.8"

services:
  posthog-web:
    image: posthog/posthog:latest
    container_name: posthog-web
    restart: unless-stopped
    ports:
      - "8100:8000"
    environment:
      DATABASE_URL: postgres://posthog:${POSTHOG_POSTGRES_PASSWORD}@postgres:5432/posthog
      REDIS_URL: redis://redis:6379/
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_DATABASE: posthog
      CLICKHOUSE_SECURE: "false"
      CLICKHOUSE_VERIFY: "false"
      CLICKHOUSE_CLUSTER: posthog
      SKIP_ASYNC_MIGRATIONS_SETUP: "1"
      POSTHOG_SKIP_MIGRATION_CHECKS: "1"
      DEPLOYMENT: hobby
      KAFKA_HOSTS: kafka:9092
      SECRET_KEY: ${POSTHOG_SECRET}
      SITE_URL: ${POSTHOG_SITE_URL}
      IS_BEHIND_PROXY: "true"
      TRUST_ALL_PROXIES: "true"
      OBJECT_STORAGE_ENDPOINT: http://object-storage:9000
      OBJECT_STORAGE_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      OBJECT_STORAGE_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      OBJECT_STORAGE_BUCKET: posthog
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_started
      kafka:
        condition: service_started
      object-storage:
        condition: service_started
    networks:
      - posthog

  posthog-worker:
    image: posthog/posthog:latest
    container_name: posthog-worker
    restart: unless-stopped
    command: ./bin/docker-worker-celery --with-scheduler
    environment:
      DATABASE_URL: postgres://posthog:${POSTHOG_POSTGRES_PASSWORD}@postgres:5432/posthog
      REDIS_URL: redis://redis:6379/
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_DATABASE: posthog
      CLICKHOUSE_SECURE: "false"
      CLICKHOUSE_VERIFY: "false"
      CLICKHOUSE_CLUSTER: posthog
      SKIP_ASYNC_MIGRATIONS_SETUP: "1"
      POSTHOG_SKIP_MIGRATION_CHECKS: "1"
      DEPLOYMENT: hobby
      KAFKA_HOSTS: kafka:9092
      SECRET_KEY: ${POSTHOG_SECRET}
      SITE_URL: ${POSTHOG_SITE_URL}
      IS_BEHIND_PROXY: "true"
      TRUST_ALL_PROXIES: "true"
      OBJECT_STORAGE_ENDPOINT: http://object-storage:9000
      OBJECT_STORAGE_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      OBJECT_STORAGE_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      OBJECT_STORAGE_BUCKET: posthog
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_started
      kafka:
        condition: service_started
      object-storage:
        condition: service_started
    networks:
      - posthog

  postgres:
    image: postgres:16-alpine
    container_name: posthog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: posthog
      POSTGRES_USER: posthog
      POSTGRES_PASSWORD: ${POSTHOG_POSTGRES_PASSWORD}
    volumes:
      - posthog-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U posthog -d posthog"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - posthog

  redis:
    image: redis:7-alpine
    container_name: posthog-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - posthog-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - posthog

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: posthog-clickhouse
    restart: unless-stopped
    volumes:
      - posthog-clickhouse-data:/var/lib/clickhouse
      - posthog-clickhouse-logs:/var/log/clickhouse-server
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/posthog.xml:ro
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/posthog-users.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - posthog

  kafka:
    image: apache/kafka:3.7.0
    container_name: posthog-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_RETENTION_BYTES: 402653184
      KAFKA_HEAP_OPTS: -Xmx512m -Xms512m
      CLUSTER_ID: posthog-kafka-cluster-001
    volumes:
      - posthog-kafka-data:/tmp/kraft-combined-logs
    networks:
      - posthog

  object-storage:
    image: minio/minio:latest
    container_name: posthog-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - posthog-minio-data:/data
    entrypoint: >
      /bin/sh -c "
      minio server /data --console-address ':9001' &
      sleep 5;
      mc alias set local http://localhost:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/posthog;
      wait
      "
    networks:
      - posthog

volumes:
  posthog-postgres-data:
  posthog-redis-data:
  posthog-clickhouse-data:
  posthog-clickhouse-logs:
  posthog-kafka-data:
  posthog-minio-data:

networks:
  posthog:
    name: posthog
    driver: bridge
